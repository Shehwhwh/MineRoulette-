<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MineRoulette</title>
</head>
<body>
    <div class="difficuluty-container">
        <button class="diff-btn" data-difficulty="легко">Легко</button>
        <button class="diff-btn" data-difficulty="средне">Средне</button>
        <button class="diff-btn" data-difficulty="трудно">Трудно</button>
        <button class="diff-btn" data-difficulty="экстрим">Экстрим</button>
        <button class="diff-btn" data-difficulty="hardcore">HARDCORE</button>
    </div>
    <div class="roulettes-container">
    <h1>MineRoulette!</h1>
    <div class="roulette-wrapper">
        <div class="roulette-marker"></div>
        <div id="block-tape" class="tape"></div>
        <div id="block-tape" class="tape"></div>
    </div>
    <div class="roulette-wrapper">
        <div class="roulette-marker"></div>
        <div id="challenge-tape" class="tape"></div>
    </div>
    
    <button id="spin-btn">ИСПЫТАТЬ УДАЧУ</button>
    <div id="result-box"></div>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    </div>
</body>
</html>
